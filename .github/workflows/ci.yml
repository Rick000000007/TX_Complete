name: Android CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'

jobs:
  # ==========================================
  # Job 1: Build & Test (Debug)
  # ==========================================
  build-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive  # If you have git submodules for C++ libs

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0
          ndk-version: 26.1.10909125  # Match your CMakeLists.txt requirements

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.konan  # For Kotlin/Native if used
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache NDK & CMake
        uses: actions/cache@v3
        with:
          path: |
            /usr/local/lib/android/sdk/ndk/
            ~/.cmake/packages
            app/build/intermediates/cmake/
          key: ${{ runner.os }}-ndk-${{ hashFiles('**/CMakeLists.txt') }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Lint Kotlin code
      - name: Run Kotlin Linter (ktlint)
        uses: musichin/ktlint-check@v3
        with:
          ktlint-version: '0.50.0'

      # Build Debug APK with NDK
      - name: Build Debug APK
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          ./gradlew :app:assembleDebug \
            --build-cache \
            --parallel \
            --no-daemon \
            -Pandroid.native.buildOutput=true

      # Run Unit Tests (JVM)
      - name: Run Unit Tests
        run: |
          ./gradlew :app:testDebugUnitTest \
            --no-daemon \
            --parallel

      # Upload Debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      # Upload native libraries for inspection
      - name: Upload Native Libraries
        uses: actions/upload-artifact@v4
        with:
          name: native-libraries
          path: |
            app/build/intermediates/cmake/debug/obj/
            app/build/intermediates/stripped_native_libs/debug/out/lib/

  # ==========================================
  # Job 2: Native Code Analysis
  # ==========================================
  native-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Check C++ Formatting
        run: |
          find app/src/main/cpp -name "*.cpp" -o -name "*.h" | \
          xargs clang-format --dry-run --Werror

      - name: Setup CppCheck (Static Analysis)
        run: sudo apt-get install -y cppcheck

      - name: Run CppCheck
        run: |
          cppcheck \
            --enable=all \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --inline-suppr \
            -I app/src/main/cpp/include \
            app/src/main/cpp/tx_core/

  # ==========================================
  # Job 3: Build Release (Unsigned)
  # ==========================================
  build-release:
    runs-on: ubuntu-latest
    needs: [build-debug, native-analysis]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-release-${{ hashFiles('**/*.gradle*') }}

      - name: Build Release APK
        run: |
          ./gradlew :app:assembleRelease \
            --no-daemon \
            -Pandroid.injected.signing.store.file=/dev/null \
            -Pandroid.injected.signing.store.password=/dev/null

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk

  # ==========================================
  # Job 4: Instrumented Tests (Emulator)
  # ==========================================
  instrumentation-tests:
    runs-on: macos-latest  # macOS for hardware acceleration
    needs: build-debug
    timeout-minutes: 45
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Instrumented Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: pixel_3
          script: |
            ./gradlew connectedCheck \
              --no-daemon \
              -Pandroid.testoptions.manageddevices.emulator.gpu="swiftshader_indirect"

